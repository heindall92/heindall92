<svg width="854" height="210" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="z-index:1;position:relative" viewBox="0 0 854 210">
  <style>
    .title { 
      font-size: 34px; 
      font-weight: 800; 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    } 
    .subtitle { 
      font-size: 16px; 
      font-weight: 500; 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      opacity: 0.85;
    } 
    .author {
      font-size: 12px;
      font-weight: 400;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      opacity: 0.6;
    }
    .title, .subtitle, .author { 
      animation: fadeIn 1.2s ease-in-out forwards; 
    } 
    @keyframes fadeIn { 
      from { opacity: 0; } 
      to { opacity: 1; } 
    } 
  </style>
  <defs>
    <!-- Background Gradient (Forest Green Theme) -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b3c1d"/>
      <stop offset="100%" stop-color="#327a44"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Waving path (Fondo gradiente animado con paths iniciales definidos) -->
  <g transform="translate(427, 105) scale(1, 1) translate(-427, -105)">
    <path d="M0 0L 0 130Q 213.5 170 427 140T 854 165L 854 0 Z" fill="url(#bg-grad)" opacity="0.4">
      <animate
          attributeName="d"
          dur="20s"
          repeatCount="indefinite"
          keyTimes="0;0.333;0.667;1"
          calcMode="spline"
          keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
          begin="0s"
          values="M0 0L 0 130Q 213.5 170 427 140T 854 165L 854 0 Z;M0 0L 0 155Q 213.5 170 427 150T 854 140L 854 0 Z;M0 0L 0 175Q 213.5 145 427 175T 854 140L 854 0 Z;M0 0L 0 130Q 213.5 170 427 140T 854 165L 854 0 Z">
      </animate>
    </path>
    <path d="M0 0L 0 145Q 213.5 190 427 160T 854 170L 854 0 Z" fill="url(#bg-grad)" opacity="0.4">
      <animate
        attributeName="d"
        dur="20s"
        repeatCount="indefinite"
        keyTimes="0;0.333;0.667;1"
        calcMode="spline"
        keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
        begin="-10s"
        values="M0 0L 0 145Q 213.5 190 427 160T 854 170L 854 0 Z;M0 0L 0 160Q 213.5 130 427 130T 854 150L 854 0 Z;M0 0L 0 155Q 213.5 135 427 160T 854 175L 854 0 Z;M0 0L 0 145Q 213.5 190 427 160T 854 170L 854 0 Z">
      </animate>
    </path>
  </g>

  <!-- Dark glass overlay to make text stand out -->
  <rect x="0" y="0" width="854" height="210" fill="#0d1117" opacity="0.6"/>

  <!-- macOS-style control window dots -->
  <g transform="translate(12, -2)">
    <circle cx="20" cy="24" r="6" fill="#ff5f56"/>
    <circle cx="38" cy="24" r="6" fill="#ffbd2e"/>
    <circle cx="56" cy="24" r="6" fill="#27c93f"/>
  </g>
  
  <!-- Text content -->
  <text text-anchor="start" dominant-baseline="middle" x="50" y="80" class="title" style="fill:#ffffff;" stroke="none">Parafarmacia</text>
  <text text-anchor="start" dominant-baseline="middle" x="50" y="125" class="subtitle" style="fill:#ffffff;">Control de stock con gemelo digital 3D</text>
  <text text-anchor="start" dominant-baseline="middle" x="50" y="165" class="author" style="fill:#ffffff;">Yoandy Ramírez | Portfolio</text>

  <!-- Project Icon on the right -->
  <g transform="translate(720, 105)" filter="url(#shadow)">
    <!-- Outer circle border -->
    <circle cx="0" cy="0" r="55" fill="#0d1117" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.85"/>
    
    <!-- 3D Shelving Grid -->
    <g transform="translate(-5, 0)">
      <!-- Row 3 (Bottom) -->
      <path d="M -40 10 L -25 10 L -15 25 L -30 25 Z" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" fill="none"/>
      <path d="M -20 10 L -5 10 L 5 25 L -10 25 Z" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" fill="none"/>
      <path d="M 0 10 L 15 10 L 25 25 L 10 25 Z" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" fill="none"/>
      <path d="M 20 10 L 35 10 L 45 25 L 30 25 Z" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" fill="none"/>

      <!-- Row 2 (Middle) -->
      <path d="M -40 -10 L -25 -10 L -15 5 L -30 5 Z" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" fill="none"/>
      <path d="M -20 -10 L -5 -10 L 5 5 L -10 5 Z" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" fill="none"/>
      <path d="M 0 -10 L 15 -10 L 25 5 L 10 5 Z" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" fill="none"/>
      <path d="M 20 -10 L 35 -10 L 45 5 L 30 5 Z" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" fill="none"/>

      <!-- Row 1 (Top) -->
      <path d="M -40 -30 L -25 -30 L -15 -15 L -30 -15 Z" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" fill="none"/>
      <path d="M -20 -30 L -5 -30 L 5 -15 L -10 -15 Z" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" fill="none"/>
      <!-- Highlighted Shelf (Bright Green Glowing) -->
      <path d="M 0 -30 L 15 -30 L 25 -15 L 10 -15 Z" fill="#38ef7d" fill-opacity="0.8" stroke="#38ef7d" stroke-width="1.5"/>
      <path d="M 20 -30 L 35 -30 L 45 -15 L 30 -15 Z" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" fill="none"/>

      <!-- Pin Pointer above Highlighted Shelf -->
      <line x1="12" y1="-23" x2="12" y2="-38" stroke="#ff5858" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="12" cy="-42" r="5.5" fill="#ff5858"/>
      <circle cx="12" cy="-42" r="9.5" fill="none" stroke="#ff5858" stroke-width="1.5" stroke-opacity="0.6"/>
    </g>
  </g>
</svg>
