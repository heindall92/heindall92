<svg width="854" height="210" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="z-index:1;position:relative" viewBox="0 0 854 210">
  <style>
    .title { 
      font-size: 34px; 
      font-weight: 800; 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    } 
    .subtitle { 
      font-size: 16px; 
      font-weight: 500; 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      opacity: 0.85;
    } 
    .author {
      font-size: 12px;
      font-weight: 400;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      opacity: 0.6;
    }
    .title, .subtitle, .author { 
      animation: fadeIn 1.2s ease-in-out forwards; 
    } 
    @keyframes fadeIn { 
      from { opacity: 0; } 
      to { opacity: 1; } 
    } 
  </style>
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#11998e"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Waving path (Fondo gradiente animado con paths iniciales definidos) -->
  <g transform="translate(427, 105) scale(1, 1) translate(-427, -105)">
    <path d="M0 0L 0 130Q 213.5 170 427 140T 854 165L 854 0 Z" fill="url(#bg-grad)" opacity="0.4">
      <animate
          attributeName="d"
          dur="20s"
          repeatCount="indefinite"
          keyTimes="0;0.333;0.667;1"
          calcMode="spline"
          keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
          begin="0s"
          values="M0 0L 0 130Q 213.5 170 427 140T 854 165L 854 0 Z;M0 0L 0 155Q 213.5 170 427 150T 854 140L 854 0 Z;M0 0L 0 175Q 213.5 145 427 175T 854 140L 854 0 Z;M0 0L 0 130Q 213.5 170 427 140T 854 165L 854 0 Z">
      </animate>
    </path>
    <path d="M0 0L 0 145Q 213.5 190 427 160T 854 170L 854 0 Z" fill="url(#bg-grad)" opacity="0.4">
      <animate
        attributeName="d"
        dur="20s"
        repeatCount="indefinite"
        keyTimes="0;0.333;0.667;1"
        calcMode="spline"
        keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
        begin="-10s"
        values="M0 0L 0 145Q 213.5 190 427 160T 854 170L 854 0 Z;M0 0L 0 160Q 213.5 130 427 130T 854 150L 854 0 Z;M0 0L 0 155Q 213.5 135 427 160T 854 175L 854 0 Z;M0 0L 0 145Q 213.5 190 427 160T 854 170L 854 0 Z">
      </animate>
    </path>
  </g>

  <!-- Dark glass overlay to make text stand out -->
  <rect x="0" y="0" width="854" height="210" fill="#0d1117" opacity="0.2"/>

  <!-- macOS-style control window dots -->
  <g transform="translate(12, -2)">
    <circle cx="20" cy="24" r="6" fill="#ff5f56"/>
    <circle cx="38" cy="24" r="6" fill="#ffbd2e"/>
    <circle cx="56" cy="24" r="6" fill="#27c93f"/>
  </g>
  
  <!-- Text content -->
  <text text-anchor="start" dominant-baseline="middle" x="50" y="80" class="title" style="fill:#ffffff;" stroke="none">JUDAS</text>
  <text text-anchor="start" dominant-baseline="middle" x="50" y="125" class="subtitle" style="fill:#ffffff;">Automatización de cadena de ataque en Active Directory</text>
  <text text-anchor="start" dominant-baseline="middle" x="50" y="165" class="author" style="fill:#ffffff;">Yoandy Ramírez | Portfolio</text>

  <!-- Project Icon on the right -->
  <g transform="translate(720, 105)" filter="url(#shadow)">
    <!-- Outer circle border -->
    <circle cx="0" cy="0" r="55" fill="#0d1117" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.85"/>
    <!-- Icon elements -->
    <!-- Lines -->
    <line x1="0" y1="0" x2="-22" y2="-15" stroke="#38ef7d" stroke-width="3"/>
    <line x1="0" y1="0" x2="22" y2="-15" stroke="#38ef7d" stroke-width="3"/>
    <line x1="0" y1="0" x2="25" y2="12" stroke="#38ef7d" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="25" stroke="#38ef7d" stroke-width="3"/>
    <line x1="0" y1="0" x2="-25" y2="12" stroke="#38ef7d" stroke-width="3"/>
    <!-- Central Node -->
    <circle cx="0" cy="0" r="9" fill="#38ef7d"/>
    <!-- Outer Nodes -->
    <circle cx="-22" cy="-15" r="6" fill="#38ef7d"/>
    <circle cx="22" cy="-15" r="6" fill="none" stroke="#38ef7d" stroke-width="2"/>
    <circle cx="25" cy="12" r="6" fill="#38ef7d"/>
    <circle cx="0" cy="25" r="6" fill="none" stroke="#38ef7d" stroke-width="2"/>
    <circle cx="-25" cy="12" r="6" fill="none" stroke="#38ef7d" stroke-width="2"/>
  </g>
</svg>
